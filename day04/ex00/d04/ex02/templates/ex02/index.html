{% extends "base.html" %}
{% load static %}
{% block content %}

<form method="post">
    {% csrf_token %}
    {{ form }}
    <input type="submit" value="Submit">
</form>
<h2>History</h2>
<ul>
    {% for entry in history %}
    <li>{{ entry }}</li>
    {% empty %}
    <li>No input history.</li>
    {% endfor %}
</ul>
{% endblock %}
