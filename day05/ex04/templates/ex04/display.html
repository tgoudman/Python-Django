{% block content %}
    <table>
        <tr>
            <th>Episode</th>
            <th>Title</th>
            <th>Opening Crawl</th>
            <th>Director</th>
            <th>Producer</th>
            <th>Release Date</th>
        </tr>
        {% for movie in data %}
        <tr>
            <td>{{ movie.episode_nb }}</td>
            <td>{{ movie.title }}</td>
            <td>{{ movie.opening_crawl }}</td>
            <td>{{ movie.director }}</td>
            <td>{{ movie.producer }}</td>
            <td>{{ movie.release_date }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="5">No data available</td></tr>
        {% endfor %}
    </table>
{% endblock %}
