<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ex03</title>
</head>
<body>
    <h1>Insertion de données</h1>
    <table>
        <tr>
            <th>Episode</th>
            <th>Title</th>
            <th>Director</th>
            <th>Producer</th>
            <th>Release Date</th>
        </tr>
        {% for movie in movies %}
        <tr>
            <td>{{ movie.episode_nb }}</td>
            <td>{{ movie.title }}</td>
            <td>{{ movie.director }}</td>
            <td>{{ movie.producer }}</td>
            <td>{{ movie.release_date }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="5">No data available</td></tr>
        {% endfor %}
    </table>
</body>
</html>
