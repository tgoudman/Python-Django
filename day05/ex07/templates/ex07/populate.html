{% extends "base.html" %}
{% block content %}
    <nav>
        <a href="/ex07/populate">Populate</a>
        <a href="/ex07/display">Display</a>
        <a href="/ex07/update">Update</a>
    </nav>
    <h1>Populate.</h1>
    {% if inserted or conflicts %}
        {% for data in inserted %}
            <p>OK: {{data}}</p>
        {% endfor %}
        {% for data in conflicts %}
            <p>Data already exist: {{data}}</p>
        {% endfor %}
    {% else %}
        <p>No data Available.</p>
    {% endif %}
{% endblock %}
