<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <link rel="stylesheet" href="style.css">
        <title>Ex03</title>
    </head>
    <body>
		<li>
			<h2>Frontend</h2>
            <p style="width: 80%" data-value="80">HTML5</p>

            <p style="width: 80%" data-value="60">CSS3</p>
            <progress class="progress-bar css3" max="100" value="60"></progress>
            <p style="width: 80%" data-value="50">jQuery</p>
            <progress class="progress-bar jquery" max="100" value="50"></progress>
		</li>
		<li>
			<h2>Backend</h2>
            <p style="width: 80%" data-value="75">Python</p>
			<progress class="progress-bar html5" max="100" value="75"></progress>
            <p style="width: 80%" data-value="65">PHP</p>
            <progress class="progress-bar css3" max="100" value="65"></progress>
            <p style="width: 80%" data-value="35">Node.js</p>

		</li>
